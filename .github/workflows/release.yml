name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present
          VERSION="${TAG#v}"
          # Append .0 for BC version format (X.Y.Z -> X.Y.Z.0)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update app.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update version in app.json using jq
          jq --arg v "$VERSION" '.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "Updated app.json to version $VERSION"
          cat app.json | grep version

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin main

  build:
    needs: update-version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: app

      - name: Checkout test repository
        uses: actions/checkout@v4
        with:
          repository: alpamayo-solutions/Dynamics365-BC-UNS-Tests
          path: tests

      - name: Read app.json
        id: app-info
        shell: pwsh
        run: |
          $appJson = Get-Content -Path "app/app.json" -Raw | ConvertFrom-Json
          $version = $appJson.version
          $name = $appJson.name
          $publisher = $appJson.publisher
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "name=$name" >> $env:GITHUB_OUTPUT
          echo "publisher=$publisher" >> $env:GITHUB_OUTPUT
          Write-Host "App: $publisher - $name v$version"

      - name: Install BcContainerHelper
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name BcContainerHelper -Force -AllowClobber
          Import-Module BcContainerHelper

      - name: Prepare source folder
        shell: pwsh
        run: |
          # Copy source to C: drive for container sharing
          $sourceDir = "C:\src"
          New-Item -ItemType Directory -Path "$sourceDir\app" -Force | Out-Null
          New-Item -ItemType Directory -Path "$sourceDir\tests" -Force | Out-Null
          Copy-Item -Path "app\*" -Destination "$sourceDir\app" -Recurse -Force
          Copy-Item -Path "tests\*" -Destination "$sourceDir\tests" -Recurse -Force
          Write-Host "Copied source files to $sourceDir"
          Get-ChildItem -Path $sourceDir -Recurse | Select-Object -First 20

      - name: Create BC Container
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $appJson = Get-Content -Path "C:\src\app\app.json" -Raw | ConvertFrom-Json
          $bcVersion = $appJson.platform -replace '\.0\.0$', ''

          $containerName = "bcbuild"
          $artifactUrl = Get-BcArtifactUrl -type OnPrem -version $bcVersion -country w1 -select Latest

          Write-Host "Creating container with artifact: $artifactUrl"

          $credential = New-Object PSCredential "admin", (ConvertTo-SecureString -String "P@ssw0rd" -AsPlainText -Force)

          New-BcContainer `
            -accept_eula `
            -containerName $containerName `
            -artifactUrl $artifactUrl `
            -auth NavUserPassword `
            -credential $credential `
            -updateHosts `
            -accept_outdated `
            -includeTestToolkit `
            -includeTestLibrariesOnly `
            -additionalParameters @("--volume", "C:\src:C:\src")

      - name: Compile AL App
        id: compile
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $containerName = "bcbuild"
          $credential = New-Object PSCredential "admin", (ConvertTo-SecureString -String "P@ssw0rd" -AsPlainText -Force)

          $appFile = Compile-AppInBcContainer `
            -containerName $containerName `
            -credential $credential `
            -appProjectFolder "C:\src\app" `
            -appOutputFolder "C:\src\app" `
            -EnableCodeCop `
            -EnableUICop

          $appFileName = Split-Path $appFile -Leaf
          echo "app-file=$appFileName" >> $env:GITHUB_OUTPUT
          Write-Host "Built: $appFileName"

      - name: Publish AL App
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $containerName = "bcbuild"
          $appFile = Get-ChildItem -Path "C:\src\app\*.app" | Select-Object -First 1

          Publish-BcContainerApp `
            -containerName $containerName `
            -appFile $appFile.FullName `
            -skipVerification `
            -install `
            -sync

          Write-Host "Published and installed: $($appFile.Name)"

      - name: Compile Test App
        id: compile-tests
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $containerName = "bcbuild"
          $credential = New-Object PSCredential "admin", (ConvertTo-SecureString -String "P@ssw0rd" -AsPlainText -Force)

          $testAppFile = Compile-AppInBcContainer `
            -containerName $containerName `
            -credential $credential `
            -appProjectFolder "C:\src\tests" `
            -appOutputFolder "C:\src\tests" `
            -appSymbolsFolder "C:\src\app"

          $testAppFileName = Split-Path $testAppFile -Leaf
          echo "test-app-file=$testAppFileName" >> $env:GITHUB_OUTPUT
          Write-Host "Built test app: $testAppFileName"

      - name: Publish Test App
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $containerName = "bcbuild"
          $testAppFile = Get-ChildItem -Path "C:\src\tests\*.app" | Select-Object -First 1

          Publish-BcContainerApp `
            -containerName $containerName `
            -appFile $testAppFile.FullName `
            -skipVerification `
            -install `
            -sync

          Write-Host "Published and installed test app: $($testAppFile.Name)"

      - name: Run Tests
        shell: pwsh
        run: |
          Import-Module BcContainerHelper

          $containerName = "bcbuild"
          $credential = New-Object PSCredential "admin", (ConvertTo-SecureString -String "P@ssw0rd" -AsPlainText -Force)

          Run-TestsInBcContainer `
            -containerName $containerName `
            -credential $credential `
            -extensionId "dbbe7042-978c-461f-abe3-5ce36a97d622" `
            -XUnitResultFileName "C:\src\TestResults.xml"

          # Copy test results to workspace
          Copy-Item -Path "C:\src\TestResults.xml" -Destination "$env:GITHUB_WORKSPACE\TestResults.xml" -Force
          Write-Host "Test results saved to TestResults.xml"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: AL Tests
          path: TestResults.xml
          reporter: java-junit
          fail-on-error: true

      - name: Copy artifacts to workspace
        if: success()
        shell: pwsh
        run: |
          Copy-Item -Path "C:\src\app\*.app" -Destination "$env:GITHUB_WORKSPACE" -Force
          Write-Host "Copied .app files to workspace"

      - name: Remove BC Container
        if: always()
        shell: pwsh
        run: |
          Import-Module BcContainerHelper
          Remove-BcContainer -containerName "bcbuild" -ErrorAction SilentlyContinue

      - name: Create zip and upload to release
        if: success()
        shell: pwsh
        run: |
          $appFile = Get-ChildItem -Path "*.app" | Select-Object -First 1
          $zipName = $appFile.BaseName + ".zip"
          Compress-Archive -Path $appFile.FullName -DestinationPath $zipName
          gh release upload ${{ github.event.release.tag_name }} $zipName --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: al-app-${{ steps.app-info.outputs.version }}
          path: "*.app"
          if-no-files-found: error
